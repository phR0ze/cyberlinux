[package]
name = "reduce"
version = "0.2.408"
edition = "2018"
authors = ["phR0ze"]
license = "MIT OR Apache-2.0"
description = "CLI for cyberlinux"
readme = "README.md"
homepage = "https://github.com/phR0ze/cyberlinux/cli"
repository = "https://github.com/phR0ze/cyberlinux/cli"
keywords = ["cyberlinux", "cli"]
categories = ["command-line-utilities"]
exclude = [
	"examples",
	"tests",
	"benches/*"
]
include = [
	"src/**/*",
	"Cargo.toml",
	"README.md"
]

[profile.release]
lto = true

[workspace]
members = ["laconic"]

[dependencies]
log = "0.4.8"
clap = "2.33.0"
glob = "0.3.0"
laconic = { path = "laconic" }
errors = { git = "https://github.com/phR0ze/rs", branch = "master" }
sys = { git = "https://github.com/phR0ze/rs", branch = "master" }