base: base
  k8snode:
    type: machine
    base: shell
    groups: [docker]
    vagrant: { vram: 8, cpus: 2, ram: 2048 }
    install:
      entry: "Deploy <%=distro%>-k8snode                 // Shell + k8s node"
      kernel: linux
    packages:
      - { install: k8snode-pkgs }
    configs:
      - { apply: k8snode-config }

  theater:
    type: machine
    base: lite
    vars: { fontsize: 18, wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    install:
      entry: "Deploy <%=distro%>-theater                 // Lite + media apps"
      kernel: linux
      params: autologin=1
    packages:
      - { install: theater-pkgs }
    configs:
      - { apply: theater-config }

  desktop:
    type: machine
    base: lite
    groups: [docker]
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    install:
      entry: "Deploy <%=distro%>-desktop                 // Lite + more apps"
      kernel: linux
    packages:
      - { install: desktop-pkgs }
    configs:
      - { apply: desktop-config }

  live:
    type: machine
    base: desktop
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    install:
      entry: "Start <%=distro%>-recovery                 // Live environment"
      kernel: linux
