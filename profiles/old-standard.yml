#base: _base

build:
  type: container
  multilib: true
  docker:
    # Note: need privileged=true to allow mount to work inside container
    params: '-e TERM=xterm -v /var/run/docker.sock:/var/run/docker.sock --privileged=true'
    command: 'bash -c "while :; do sleep 5; done"'
  packages:
    - { pkg: linux,                           desc: Linux kernel and supporting modules }
    - { pkg: gptfdisk,                        desc: Paritioning tools e.g. sgdisk }
    - { pkg: mkinitcpio,                      desc: initramfs image creation utility }
    - { pkg: mkinitcpio-vt-colors,            desc: vt console colors, type: CYBERLINUX }
    - { pkg: rsync,                           desc: Remote file sync utility }
    - { pkg: systemd,                         desc: System and service manager }
    - { pkg: sudo,                            desc: Elevate some user commands to root }
    - { install: core-pkgs }
    - { install: core-tools }
    - { install: grub-pkgs }
  configs:
    # Create and configure new build user and root user
    - { chroot: 'useradd -m -G lp,wheel,network,storage,users -s /bin/bash build || true' }
    - { exec: 'find /<%=base_src%>/etc/skel -maxdepth 1 -type f | xargs cp -t /home/build' }
    - { exec: "echo 'TERM=xterm' > /etc/environment" }
    - { exec: 'find /<%=base_src%>/etc/skel -maxdepth 1 -type f | xargs cp -t /root' }
    - { edit: /etc/sudoers, insert: append, value: "build ALL=(ALL) NOPASSWD: ALL" }
    - { apply: core-config }
    - { apply: mkinitcpio-config }

deployments:
  base:
    type: machine
    multilib: true
    groups: [lp, wheel, network, storage, users]
    vars: { fontsize: 10 }
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    install:
      entry: "Deploy <%=distro%>-base                    // Minimal shell"
      kernel: linux
    packages:
      - { pkg: linux,                         desc: Linux kernel and supporting modules }
      - { install: base-pkgs }
      - { install: base-tools }
      - { install: virtualbox-guest-nox }

    configs:
      - { apply: base-config }

  shell:
    type: machine
    base: base
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    install:
      entry: "Deploy <%=distro%>-shell                   // Base + shell devel"
      kernel: linux
    packages:
      - { pkg: linux-docs,                    desc: Linux kernel docs }
      - { pkg: linux-headers,                 desc: Linux kernel headers }
      - { install: shell-pkgs }
    configs:
      - { apply: shell-config }

  lite:
    type: machine
    base: shell
    groups: [ video, audio]
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    install:
      entry: "Deploy <%=distro%>-lite                    // Shell + min X11"
      kernel: linux
    packages:
      - { install: lite-pkgs }
      - { install: virtualbox-guest }
    configs:
      - { apply: lite-config }

  k8snode:
    type: machine
    base: shell
    groups: [docker]
    vagrant: { vram: 8, cpus: 2, ram: 2048 }
    install:
      entry: "Deploy <%=distro%>-k8snode                 // Shell + k8s node"
      kernel: linux
    packages:
      - { install: k8snode-pkgs }
    configs:
      - { apply: k8snode-config }

  theater:
    type: machine
    base: lite
    vars: { fontsize: 18, wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    install:
      entry: "Deploy <%=distro%>-theater                 // Lite + media apps"
      kernel: linux
      params: autologin=1
    packages:
      - { install: theater-pkgs }
    configs:
      - { apply: theater-config }

  desktop:
    type: machine
    base: lite
    groups: [docker]
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    install:
      entry: "Deploy <%=distro%>-desktop                 // Lite + more apps"
      kernel: linux
    packages:
      - { install: desktop-pkgs }
    configs:
      - { apply: desktop-config }

  live:
    type: machine
    base: desktop
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    install:
      entry: "Start <%=distro%>-recovery                 // Live environment"
      kernel: linux
