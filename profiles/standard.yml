base: base

deployments:
  base:
    type: machine
    multilib: true
    groups: [lp, wheel, network, storage, users]
    vars: {fontsize: 10}
    vagrant: {vram: 32, cpus: 2, ram: 2048}
    install:
      order: 1
      label: "Deploy <%=distro%>-base                    // Base shell env"
      kernel: linux
    apps:
      - kernel
      - base-apps
      - shell-apps
      - virtualbox-guest-nox

  lite:
    type: machine
    base: base
    groups: [video, audio]
    vars: {wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg}
    vagrant: {vram: 32, cpus: 2, ram: 2048, v3d: 'on'}
    install:
      order: 2
      label: "Deploy <%=distro%>-lite                    // Shell + min X11"
      kernel: linux
    apps:
      - lite-apps
      - virtualbox-guest

#  k8snode:
#    type: machine
#    base: base
#    groups: [docker]
#    vagrant: { vram: 8, cpus: 2, ram: 2048 }
#    install:
#      label: "Deploy <%=distro%>-k8snode                 // Shell + k8s node"
#      kernel: linux
#    packages:
#      - { install: k8snode-apps }
#    configs:
#      - { apply: k8snode-config }

  theater:
    type: machine
    base: lite
    vars: { fontsize: 18, wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    install:
      order: 4
      entry: "Deploy <%=distro%>-theater                 // Lite + media apps"
      label: linux
      params: autologin=1
    packages:
      - { install: theater-apps }
    configs:
      - { apply: theater-config }

  desktop:
    type: machine
    base: lite
    groups: [docker]
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    install:
      entry: "Deploy <%=distro%>-desktop                 // Lite + more apps"
      kernel: linux
    packages:
      - { install: desktop-pkgs }
    configs:
      - { apply: desktop-config }

  live:
    type: machine
    base: desktop
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    install:
      order: 1
      label: "Start <%=distro%>-recovery                 // Live environment"
      kernel: linux
