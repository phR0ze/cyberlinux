base: base

deployments:
  base:
    type: machine
    multilib: true
    groups: [lp, wheel, network, storage, users]
    vars: { fontsize: 10 }
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    deploy:
      label: "Deploy <%=distro%>-base                    // Shell env"
      kernel: linux
    apps:
      - kernel
      - base-apps
      - shell-apps
      - virtualbox-guest-nox

