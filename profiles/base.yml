  sysctld-config:
    # Minimal amount of swapping without disabling it entirely
    - { edit: '/etc/sysctl.d/10-<%=distro%>.conf', insert: append, value: "vm.swappiness = 1" }
    # Enable kernel ipv4 forwarding for containers
    - { edit: '/etc/sysctl.d/10-<%=distro%>.conf', insert: append, value: "net.ipv4.ip_forward = 1" }
    # Disable ipv6 forwarding
    - { edit: '/etc/sysctl.d/10-<%=distro%>.conf', insert: append, value: "net.ipv6.conf.all.forwarding = 0" }
    # Increase the number of user file watches to max
