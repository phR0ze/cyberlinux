vars:
  arch: x86_64
  release: 0.1.349
  distro: cyberlinux
  language: en_US
  character_set: UTF-8
  timezone: US/Mountain
  country: United_States
  color_light: '#39AEF4'
  color_dark: '#216A94'
  gfxmode: 1280x1024,1024x768,auto
  grub_iso_theme: /boot/grub/themes/cyberlinux

  # Kernel params
  # ----------------------------------------------------------------------------
  # ipv6.disable=1              // don't really need or want ipv6
  # rd.systemd.show_status=auto // reduce systemd boot logging
  # rd.udev.log_priority=3      // reduce udev boot logging
  kernel_params: rd.systemd.show_status=auto rd.udev.log_priority=3 ipv6.disable=1

  # Vagrant networking
  netname: vboxnet0
  netip: 192.168.56.1
  subnet: 255.255.255.0

  # NFS allowed cidr
  nfscidr: 192.168.56.0/24

################################################################################
build:
  type: container
  multilib: true
  docker:
    # Note: need privileged=true to allow mount to work inside container
    params: '-e TERM=xterm -v /var/run/docker.sock:/var/run/docker.sock --privileged=true'
    command: 'bash -c "while :; do sleep 5; done"'
  apps:
    - { install: linux,                         desc: Linux kernel and supporting modules }
    - { install: gptfdisk,                      desc: Paritioning tools e.g. sgdisk }
    - { install: mkinitcpio,                    desc: initramfs image creation utility }
    - { install: mkinitcpio-vt-colors,          desc: vt console colors, type: CYBERLINUX }
    - { install: rsync,                         desc: Remote file sync utility }
    - { install: systemd,                       desc: System and service manager }
    - { install: sudo,                          desc: Elevate some user commands to root }
    - core-apps
    - core-tools
    - grub-tools
  configs:
    # Create and configure new build user and root user
    - { chroot: 'useradd -m -G lp,wheel,network,storage,users -s /bin/bash build || true' }
    - { exec: 'find /<%=base_src%>/etc/skel -maxdepth 1 -type f | xargs cp -t /home/build' }
    - { exec: "echo 'TERM=xterm' > /etc/environment" }
    - { exec: 'find /<%=base_src%>/etc/skel -maxdepth 1 -type f | xargs cp -t /root' }
    - { edit: /etc/sudoers, insert: append, value: "build ALL=(ALL) NOPASSWD: ALL" }
    - config-core
    - config-mkinitcpio

################################################################################
apps:
