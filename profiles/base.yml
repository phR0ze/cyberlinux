  timesyncd-config:
    - { exec: 'rm -f /etc/systemd/timesyncd.conf' }
    - edit: /etc/systemd/timesyncd.conf
      insert: append
      values:
        - '[Time]'
        - 'NTP=0.arch.pool.ntp.org 1.arch.pool.ntp.org 2.arch.pool.ntp.org 3.arch.pool.ntp.org'
        - 'FallbackNTP=0.pool.ntp.org 1.pool.ntp.org 0.fr.pool.ntp.org'
  user-dirs-config:
    - { exec: 'rm -f /etc/xdg/user-dirs.defaults' }
    - edit: /etc/xdg/user-dirs.defaults
      insert: append
      values:
        - 'DESKTOP=Desktop'
        - 'DOCUMENTS=Documents'
        - 'DOWNLOAD=Downloads'
        - 'PROJECTS=Projects'
        - 'SCRIPTS=bin'
  vconsole-config:
    - {edit: /etc/vconsole.conf, insert: append, value: 'KEYMAP=us' }
  wallpaper-config:
    - edit: /etc/skel/.config/nitrogen/bg-saved.cfg
      insert: append
      values:
        - '[xin_-1]'
        - 'file=<%=wallpaper%>'
        - 'mode=4'
        - 'bgcolor=#000000'
    - edit: /etc/skel/.config/nitrogen/nitrogen.cfg
      insert: append
      values:
        - '[geometry]'
        - 'posx=89'
        - 'posy=70'
        - 'sizex=839'
        - "sizey=643\n"
        - '[nitrogen]'
        - 'view=icon'
        - 'recurse=true'
        - 'sort=alpha'
        - 'icon_caps=false'
        - 'dirs=/usr/share/wallpaper;'
  wpa-gui:
    # Autostart WPA Gui
    - { exec: 'cp /usr/share/applications/wpa_gui.desktop /etc/skel/.config/autostart' }
    # Enable wpa_supplicant out of the box so we have WiFi running
    - { chroot: systemctl enable wpa_supplicant@wlp2s0 }
  wpa-config:
    - edit: /etc/wpa_supplicant/wpa_supplicant-wlp2s0.conf
      insert: append
      values:
        # Set permissions for wpa_supplicant
        - 'ctrl_interface=/run/wpa_supplicant'
        - 'ctrl_interface_group=wheel'
        # Allow WPA GUI to update this file with persistent changes
        - 'update_config=1'
        # Completely disable P2P/Direct WiFi - security hole
        - 'p2p_disabled=1'
        # Automatically scan and select networks matching saved ones
        - 'ap_scan=1'
  xorg-config:
    - edit: /opt/<%=distro%>/bin/pre-xorg
      insert: append
      values:
        - '#!/bin/bash'
        - '# Set resolution for virtuabox deployment'
        - 'display_conf=/etc/X11/xorg.conf.d/10-display.conf'
        - 'if [ ! -f $display_conf ]; then'
        - '  if [ $(lsmod | grep "vboxvideo" &>/dev/null; echo $?) == 0 ]; then'
        - "    echo 'Section \"Screen\"' > $display_conf"
        - "    echo '    Identifier \"Screen0\"' >> $display_conf"
        - "    echo '    SubSection \"Display\"' >> $display_conf"
        - "    echo '        Depth 24' >> $display_conf"
        - "    echo '        Modes \"1280x1024\"' >> $display_conf"
        - "    echo '    EndSubSection' >> $display_conf"
        - "    echo 'EndSection' >> $display_conf"
        - '  fi'
        - 'fi'
    - { exec: chmod +x /opt/<%=distro%>/bin/pre-xorg }
    - edit: /etc/X11/xorg.conf.d/20-dpms.conf
      insert: append
      values:
        - 'Section "Monitor"'
        - '    Identifier "Monitor0"'
        - '    Option     "DPMS" "0"'
        - 'EndSection'
        - 'Section "ServerLayout"'
        - '    Identifier "ServerLayout0"'
        - '    Option     "OffTime" "0"'
        - '    Option     "BlankTime" "0"'
        - '    Option     "StandbyTime" "0"'
        - '    Option     "SuspendTime" "0"'
        - 'EndSection'
    - edit: /etc/X11/xorg.conf.d/30-mouse.conf
      insert: append
      values:
        - 'Section "InputClass"'
        - '    Identifier "Mouse"'
        - '    Driver "libinput"'
        - '    MatchIsPointer "on"'
        - '    Option "AccelSpeed" "0.3"'
        - 'EndSection'
    - edit: /etc/X11/xorg.conf.d/40-touchpad.conf
      insert: append
      values:
        - 'Section "InputClass"'
        - '    Identifier "Touchpad"'
        - '    Driver "libinput"'
        - '    MatchIsTouchpad "on"'
        - '    Option "Tapping" "on"'
        - '    Option "AccelSpeed" "1"'
        - '    Option "NaturalScrolling" "on"'
        - 'EndSection'
