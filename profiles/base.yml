# Provides globally useful vars for templating
################################################################################
vars:
  arch: x86_64
  release: 0.2.47
  distro: cyberlinux
  language: en_US
  character_set: UTF-8
  timezone: US/Mountain
  country: United_States
  color_light: '#39AEF4'
  color_dark: '#216A94'
  gfxmode: 1280x1024,1024x768,auto
  grub_iso_theme: /boot/grub/themes/cyberlinux

  # Vagrant networking
  netname: vboxnet0
  netip: 192.168.56.1
  subnet: 255.255.255.0

  # NFS allowed cidr
  nfscidr: 192.168.56.0/24

  # Kernel params
  # ----------------------------------------------------------------------------
  # ipv6.disable=1              // don't really need or want ipv6
  # rd.systemd.show_status=auto // reduce systemd boot logging
  # rd.udev.log_priority=3      // reduce udev boot logging
  kernel_params: rd.systemd.show_status=auto rd.udev.log_priority=3 ipv6.disable=1

# Defaults provide a base used when a value is not given for deployments
################################################################################
defaults:
  machine:
    type: machine
    multilib: true
    vars:
      fontsize: 10
      wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg
    install: {kernel: linux}
    groups: [lp, wheel, network, storage, users]
    vagrant: {vram: 32, cpus: 2, ram: 2048, v3d: 'on'}

# Container for building components for ISO
################################################################################
builder:
  type: container
  multilib: true
  docker:
    # Note: need privileged=true to allow mount to work inside container
    params: '-e TERM=xterm -v /var/run/docker.sock:/var/run/docker.sock --privileged=true'
    command: 'bash -c "while :; do sleep 5; done"'
  apps:
    - builder

# Collection of packages and configuration needed for apps
################################################################################
apps:
  kernel:
    - {install: linux,               desc: Linux kernel and supporting modules }
  kernel-full:
    - kernel
    - {install: linux-docs,          desc: Linux kernel docs }
    - {install: linux-headers,       desc: Linux kernel headers }

  # Packages and configs for building initramfs etc...
  # ----------------------------------------------------------------------------
  builder:
    - core-boot
    - kernel
    - mkinitcpio
    - {install: gptfdisk,            desc: Paritioning tools e.g. sgdisk }
    - {install: rsync,               desc: Remote file sync utility }

    # Grub tools
    - {install: dosfstools,          desc: DOS filesystem utilities e.g. mkfs.fat }
    - {install: intel-ucode,         desc: Microcode update files for Intel CPUs }
    - {install: licenses,            desc: Standard licenses distribution package }
    - {install: memtest86+,          desc: memtest is used in the ISO creation as menu option }

    # Create and configure new build user and root user
    - {chroot: 'useradd -m -G lp,wheel,network,storage,users -s /bin/bash builder || true' }
    - {exec: 'find /<%=core_src%>/etc/skel -maxdepth 1 -type f | xargs cp -t /home/builder' }
    - {exec: "echo 'TERM=xterm' > /etc/environment" }
    - {exec: 'find /<%=core_src%>/etc/skel -maxdepth 1 -type f | xargs cp -t /root' }
    - {edit: /etc/sudoers, insert: append, value: "builder ALL=(ALL) NOPASSWD: ALL" }

  # Smallest set of packages required to have a ruby container
  # bash is a dependency of gdbm which is a dependency of ruby so ruby-core builds off core
  # Size: 63.39 MiB
  # ----------------------------------------------------------------------------
  ruby:
    - core
    - openssl-without-perl
    - {install: ruby,                desc: Ruby, depends-on: [gdbm, openssl, libffi, libyaml, gmp, zlib], size: 11.15 MiB }
    - {install: gdbm,                desc: GNU database library, depends-on: [glibc, bash], size: 443.00 KiB }
    - {install: gmp,                 desc: Library for precision arithmetic, depends-on: [gcc-libs, bash], size: 945.00 KiB }
    - {install: libffi,              desc: Portable foreign function interface, depends-on: [glibc], size: 64.00 KiB }
    - {install: libyaml,             desc: YAML 1.1 library, size: 177.00 KiB }
    - {install: rubygems,            desc: Package management framework for Ruby, depends-on: [ruby], size: 1026.00 KiB }
    - {install: zlib,                desc: Compression got gzip and pkzip, depends-on: [glibc], size: 326.00 KiB }

  # Smallest set of packages possible for a functioning container with bash
  # Size: 53.14 MiB
  # ----------------------------------------------------------------------------
  core:
    - {install: bash,                desc: GNU Bourne Again shell, depends-on: [readline, glibc, ncurses], size: 7321.00 KiB}
    - {install: bash-completion,     desc: Bash tab completion, size: 799.00 KiB}
    - {install: gcc-libs,            desc: GCC runtime libraries, depends-on: [glibc], size: 105.27 MiB}
    - {install: glibc,               desc: GNU C Library, depends-on: [linux-api-headers, tzdata, filesystem], size: 41.40 MiB}
    - {install: filesystem,          desc: Base Arch Linux files, depends-on: [iana-etc], size: 9.00 KiB}
    - {install: iana-etc,            desc: /etc/protocols and /etc/services provided by IANA, size: 3941.00 KiB}
    - {install: linux-api-headers,   desc: Kernel headers sanitized for use in userspace, size: 4168.00 KiB}
    - {install: ncurses,             desc: System V curses emulation library, depends-on: [glibc, gcc-libs], size: 3645.00 KiB}
    - {install: readline,            desc: GNU readline library, depends-on: [glibc, ncurses], size: 731.00 KiB}
    - {install: tzdata,              desc: Sources for time zone and daylight savings time data, size: 1861.00 KiB}
    - config-bash
    - config-hosts
    - config-locale
    - config-lsb-release
    - config-os-release
    - config-proxy
    - config-sysctld
    - config-user-dirs
    - remove-container-waste
    - {edit: /etc/vconsole.conf, insert: append, value: 'KEYMAP=us' }

  # Most basic linux shell tools e.g. ls, cp, mv, hostname, gzip, tar and vim
  # ----------------------------------------------------------------------------
  core-tools:
    - openssl-with-perl
    - {install: coreutils,           desc: Utils ls/cp/mv, depends-on: [glibc, acl, attr, gmp, libcap, openssl], size: 13.79 MiB }
    - {install: gzip,                desc: GNU compression utility, depof: locale-gen, group: [build-devel]}
    - {install: inetutils,           desc: hostname, ftp, telnet }
    - {install: iproute2,            desc: ifcfg/ip other networking tools }
    - {install: net-tools,           desc: arp/ifconfig/iptunnel/netstat }
    - {install: procps-ng,           desc: pidof/pkill/ps/top/uptime etc..., size: 1MB }
    - {install: sed,                 desc: GNU stream editor, depof: locale-gen, group: [build-devel], size: 1MB }
    - {install: tar,                 desc: File store backup and transport utility, depof: k8s cp }
    - {install: vim,                 desc: Improved version of vi text editor, size: 28MB }

  # perl is huge, slow, outdated and useless, however some packages still use it.
  # containers should use the without-perl option to reduce size while machines will need to use with to behave normally
  openssl-with-perl:
    - {install: openssl,             desc: Secure sockets layer and TLS, depends-on: [perl], size: 6.36 MiB }
    - {install: perl,                desc: Perl language, depends-on: [gdbm, db, glibc], size: 52.00 MiB }
  openssl-without-perl:
    - {install: openssl,             desc: Secure sockets layer and TLS, nodeps: true, depends-on: [perl], size: 6.36 MiB }
    - {install: perl,                desc: Perl language, ignore: true, depends-on: [gdbm, db, glibc], size: 52.00 MiB }

  # Minimal bootable base for any machine
  # Still requires a kernel is chosen in the deployment yaml e.g. - kernel
  # ----------------------------------------------------------------------------
  core-boot:
    - core
    - core-tools
    - sudo
    - systemd
    - {install: cyberlinux-grub,     desc: GNU GRand Unified Booloader 2, type: CYBERLINUX }

