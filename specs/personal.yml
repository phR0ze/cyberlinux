# Personal - uses applications with various restrictions and can not be used
# commercial purposes. It is only to be used for personal use only.
# ------------------------------------------------------------------------------
layers:

  # Base
  # ----------------------------------------------------------------------------
  - name: base
    type: machine
    multilib: true
    vars: { fontsize: 10 }
    groups: [lp, wheel, network, storage, users]
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    boot:
      - entry: "Install <%=distro%>-base        (minimal shell env)"
        kernel: /images/vmlinuz
        initrd: /images/intel-ucode.img,/images/initramfs.img ipv6.disable=1 layers=<%=base_layers%> showopts vga=792
      - { entry: Hardware Detection Tool, label: hdt, kernel: hdt.c32, noboot: true }
      - { entry: memory test,  label: memtest, kernel: /images/memtest, noboot: true }
      - { entry: Reboot, label: reboot, kernel: reboot.c32, noboot: true }
      - { entry: Poweroff, label: poweroff, kernel: poweroff.c32, noboot: true }
    packages:
      - { install: machine-pkgs }
      - { install: machine-tools }
      - { install: virtualbox-guest-nox }

    configs:
      - { apply: machine-config }

  # Shell
  # ----------------------------------------------------------------------------
  - name: shell
    type: machine
    base: base
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    boot:
      - entry: "Install <%=distro%>-shell        (base + full shell dev env)"
        kernel: /images/vmlinuz
        initrd: /images/intel-ucode.img,/images/initramfs.img ipv6.disable=1 layers=<%=shell_layers%> showopts vga=792
    packages:
      - { install: shell-pkgs }
    configs:
      - { apply: shell-config }

  # Lite
  # ----------------------------------------------------------------------------
  - name: lite
    type: machine
    base: shell
    vars:
      wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg
    groups:
      - video
      - audio
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Install <%=distro%>-lite           (shell + minimal X11 env)"
        kernel: /images/vmlinuz
        initrd: /images/intel-ucode.img,/images/initramfs.img ipv6.disable=1 layers=<%=lite_layers%> showopts vga=792
    packages:
      - { install: lite-pkgs }

      # Adobe fonts from adobe reader
      # https://aur.archlinux.org/cgit/aur.git/tree/LICENSE?h=ttf-adobe-fonts
      - { pkg: ttf-adobe-fonts,               desc: Adobe fonts including Myriad Minion and Courier, type: CYBERLINUX }
    configs:
      - { apply: lite-config }

  # Chrome
  # ----------------------------------------------------------------------------
  - name: chrome
    type: machine
    base: lite
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Install <%=distro%>-chrome   (lite + chromebook)"
        kernel: /images/vmlinuz
        initrd: /images/intel-ucode.img,/images/initramfs.img ipv6.disable=1 layers=<%=chrome_layers%> showopts vga=792
    packages:
      #- { install: chrome-pkgs }

      # Teamviewer is free to use for personal use
      # https://www.teamviewer.com/en/credentials/free-for-personal-use/
      - { pkg: teamviewer,                    desc: All-In-One Software for Remote Support and Online Meetings, type: CYBERLINUX }
    configs:
      #- { apply: chrome-config }
      - { apply: teamviewer-client-config }

  # Server
  # ----------------------------------------------------------------------------
  - name: server
    type: machine
    base: lite
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Install <%=distro%>-server     (lite + LAMP and services)"
        kernel: /images/vmlinuz
        initrd: /images/intel-ucode.img,/images/initramfs.img ipv6.disable=1 layers=<%=server_layers%> showopts autologin=1 vga=792
    packages:
      - { install: server-pkgs }

      # MakeMKV is free while in beta but is a commercial product required a license normally
      # https://www.makemkv.com/forum2/viewtopic.php?f=5&t=1053
      - { pkg: makemkv,                       desc: DVD and Blu-ray to MKV converter, type: CYBERLINUX }

      # Teamviewer is free to use for personal use
      # https://www.teamviewer.com/en/credentials/free-for-personal-use/
      - { pkg: teamviewer,                    desc: All-In-One Software for Remote Support and Online Meetings, type: CYBERLINUX }
    configs:
      - { apply: server-config }
      - { apply: makemkv-config }
      - { apply: teamviewer-host-config }

  # Heavy
  # ----------------------------------------------------------------------------
  - name: heavy
    type: machine
    base: lite
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Install <%=distro%>-heavy      (lite + more apps)"
        kernel: /images/vmlinuz
        initrd: /images/intel-ucode.img,/images/initramfs.img ipv6.disable=1 layers=<%=heavy_layers%> showopts vga=792
    packages:
      - { install: heavy-pkgs }

      # MakeMKV is free while in beta but is a commercial product required a license normally
      # https://www.makemkv.com/forum2/viewtopic.php?f=5&t=1053
      - { pkg: makemkv,                       desc: DVD and Blu-ray to MKV converter, type: CYBERLINUX }

      # Teamviewer is free to use for personal use
      # https://www.teamviewer.com/en/credentials/free-for-personal-use/
      - { pkg: teamviewer,                    desc: All-In-One Software for Remote Support and Online Meetings, type: CYBERLINUX }
    configs:
      - { apply: heavy-config }
      - { apply: makemkv-config }
      - { apply: teamviewer-host-config }

  # Theater
  # ----------------------------------------------------------------------------
  - name: theater
    type: machine
    base: heavy
    vars: { fontsize: 18 }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Install <%=distro%>-theater    (heavy + media/kodi)"
        kernel: /images/vmlinuz
        initrd: /images/intel-ucode.img,/images/initramfs.img ipv6.disable=1 layers=<%=theater_layers%> showopts vga=792
    packages:
      - { install: theater-pkgs }
    configs:
      - { apply: theater-config }

  # Desktop
  # ----------------------------------------------------------------------------
  - name: desktop
    type: machine
    base: heavy
    groups: [docker]
    vars:
      wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Install <%=distro%>-desktop   (heavy + dev/office)"
        kernel: /images/vmlinuz
        initrd: /images/intel-ucode.img,/images/initramfs.img ipv6.disable=1 layers=<%=desktop_layers%> showopts vga=792
    packages:
      - { install: desktop-pkgs }

      # The Extension Pack binaries are released under the VirtualBox Personal Use and Evaluation License (PUEL).
      # https://www.virtualbox.org/wiki/Downloads
      - { pkg: virtualbox-ext-oracle,         desc: Oracle VM VirtualBox Extension Pack, type: CYBERLINUX }
    configs:
      - { apply: desktop-config }

  # Live
  # ----------------------------------------------------------------------------
  - name: live
    type: machine
    base: heavy
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Start <%=distro%>-live            (ive boot env)"
        kernel: /images/vmlinuz
        initrd: /images/intel-ucode.img,/images/initramfs.img ipv6.disable=1 layers=<%=live_layers%> showopts vga=792
