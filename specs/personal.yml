# Personal - uses applications with various restrictions and can not be used
# commercial purposes. It is only to be used for personal use only.
# ------------------------------------------------------------------------------
build:
  name: build
  type: container
  multilib: true
  docker:
    # Note: need privileged=true to allow mount to work inside container
    params: '-e TERM=xterm -v /var/run/docker.sock:/var/run/docker.sock --privileged=true'
    command: 'bash -c "while :; do sleep 5; done"'
  packages:
    - { pkg: linux,                         desc: Linux kernel and supporting modules }
    - { pkg: gptfdisk,                      desc: Paritioning tools e.g. sgdisk }
    - { pkg: mkinitcpio,                    desc: initramfs image creation utility }
    - { pkg: mkinitcpio-vt-colors,          desc: vt console colors, type: CYBERLINUX }
    - { pkg: rsync,                         desc: Remote file sync utility }
    - { pkg: systemd,                       desc: System and service manager }
    - { pkg: sudo,                          desc: Elevate some user commands to root }
    - { install: core-pkgs }
    - { install: core-tools }
    - { install: grub-pkgs }
  configs:
    # Create and configure new build user and root user
    - { chroot: 'useradd -m -G lp,wheel,network,storage,users -s /bin/bash build || true' }
    - { exec: 'find /<%=base_src%>/etc/skel -maxdepth 1 -type f | xargs cp -t /home/build' }
    - { exec: "echo 'TERM=xterm' > /etc/environment" }
    - { exec: 'find /<%=base_src%>/etc/skel -maxdepth 1 -type f | xargs cp -t /root' }
    - { edit: /etc/sudoers, insert: append, value: "build ALL=(ALL) NOPASSWD: ALL" }
    - { apply: core-config }
    - { apply: mkinitcpio-config }

layers:

  # Base
  # ----------------------------------------------------------------------------
  - name: base
    type: machine
    multilib: true
    groups: [lp, wheel, network, storage, users]
    vars: { fontsize: 10 }
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    deployment:
      entry: "Deploy <%=distro%>-base                    // Shell env"
      kernel: linux
    packages:
      - { pkg: linux,                       desc: Linux kernel and supporting modules }
      - { pkg: linux-docs,                  desc: Linux kernel docs }
      - { pkg: linux-headers,               desc: Linux kernel headers }
      - { install: machine-pkgs }
      - { install: machine-tools }
      - { install: virtualbox-guest-nox }
      - { install: shell-pkgs }

    configs:
      - { apply: machine-config }
      - { apply: shell-config }

  # Lite
  # ----------------------------------------------------------------------------
  - name: lite
    type: machine
    base: base
    groups: [ video, audio]
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Deploy <%=distro%>-lite                    // Base + min X11"
      kernel: linux
    packages:
      - { install: lite-pkgs }

      # Adobe fonts from adobe reader
      # https://aur.archlinux.org/cgit/aur.git/tree/LICENSE?h=ttf-adobe-fonts
      - { pkg: ttf-adobe-fonts,               desc: Adobe fonts including Myriad Minion and Courier, type: CYBERLINUX }
    configs:
      - { apply: lite-config }

  # Server
  # ----------------------------------------------------------------------------
  - name: server
    type: machine
    base: lite
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Deploy <%=distro%>-server                  // Lite + services"
      kernel: linux
    packages:
      - { install: server-pkgs }

      # MakeMKV is free while in beta but is a commercial product required a license normally
      # https://www.makemkv.com/forum2/viewtopic.php?f=5&t=1053
      - { pkg: makemkv,                       desc: DVD and Blu-ray to MKV converter, type: CYBERLINUX }

      # Teamviewer is free to use for personal use
      # https://www.teamviewer.com/en/credentials/free-for-personal-use/
      - { pkg: teamviewer,                    desc: All-In-One Software for Remote Support and Online Meetings, type: CYBERLINUX }
    configs:
      - { apply: server-config }
      - { apply: makemkv-config }
      - { apply: teamviewer-host-config }

  # Heavy
  # ----------------------------------------------------------------------------
  - name: heavy
    type: machine
    base: lite
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Deploy <%=distro%>-heavy                   // Lite + more bling"
      kernel: linux
    packages:
      - { install: heavy-pkgs }

      # MakeMKV is free while in beta but is a commercial product required a license normally
      # https://www.makemkv.com/forum2/viewtopic.php?f=5&t=1053
      - { pkg: makemkv,                       desc: DVD and Blu-ray to MKV converter, type: CYBERLINUX }

      # Teamviewer is free to use for personal use
      # https://www.teamviewer.com/en/credentials/free-for-personal-use/
      - { pkg: teamviewer,                    desc: All-In-One Software for Remote Support and Online Meetings, type: CYBERLINUX }
    configs:
      - { apply: heavy-config }
      - { apply: makemkv-config }
      - { apply: teamviewer-host-config }

  # Theater
  # ----------------------------------------------------------------------------
  - name: theater
    type: machine
    base: heavy
    vars: { fontsize: 18, wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Deploy <%=distro%>-theater                 // Heavy + media apps"
      kernel: linux
      params: autologin=1
    packages:
      - { install: theater-pkgs }
    configs:
      - { apply: theater-config }

  # Desktop
  # ----------------------------------------------------------------------------
  - name: desktop
    type: machine
    base: heavy
    groups: [docker]
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Deploy <%=distro%>-desktop                 // Heavy + more apps"
      kernel: linux
    packages:
      - { install: desktop-pkgs }

      # The Extension Pack binaries are released under the VirtualBox Personal Use and Evaluation License (PUEL).
      # https://www.virtualbox.org/wiki/Downloads
      - { pkg: virtualbox-ext-oracle,         desc: Oracle VM VirtualBox Extension Pack, type: CYBERLINUX }
    configs:
      - { apply: desktop-config }

  # Recovery
  # ----------------------------------------------------------------------------
  - name: live
    type: machine
    base: heavy
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Start <%=distro%>-recovery                 // Live environment"
      kernel: linux
