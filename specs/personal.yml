# Personal - uses applications with various restrictions and can not be used
# commercial purposes. It is only to be used for personal use only.
# ------------------------------------------------------------------------------
layers:

  # Base
  # ----------------------------------------------------------------------------
  - name: base
    type: machine
    multilib: true
    vars: { fontsize: 10 }
    groups: [lp, wheel, network, storage, users]
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    boot:
      - entry: "Deploy <%=distro%>-base                     // Minimal shell environment"
    packages:
      - { install: machine-pkgs }
      - { install: machine-tools }
      - { install: virtualbox-guest-nox }

    configs:
      - { apply: machine-config }

  # Shell
  # ----------------------------------------------------------------------------
  - name: shell
    type: machine
    base: base
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    boot:
      - entry: "Deploy <%=distro%>-shell                    // Base + full shell development env"
    packages:
      - { install: shell-pkgs }
    configs:
      - { apply: shell-config }

  # Lite
  # ----------------------------------------------------------------------------
  - name: lite
    type: machine
    base: shell
    vars:
      wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg
    groups:
      - video
      - audio
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-lite                     // Shell + minimal X11 environment"
    packages:
      - { install: lite-pkgs }

      # Adobe fonts from adobe reader
      # https://aur.archlinux.org/cgit/aur.git/tree/LICENSE?h=ttf-adobe-fonts
      - { pkg: ttf-adobe-fonts,               desc: Adobe fonts including Myriad Minion and Courier, type: CYBERLINUX }
    configs:
      - { apply: lite-config }

  # Chromebook
  # ----------------------------------------------------------------------------
  - name: chromebook
    type: machine
    base: lite
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-chromebook               // Lite + light laptop oriented apps"
    packages:
      - { install: chromebook-pkgs }
      # GalliumOS Apps
      # ------------------
      # theme             // Nice gray/white
      # Thunar            // Filemanager
      # Hexchat           // IRC
      # Pidgin            // Messaging
      # DeaDBeef          // Audio player
      # Xfce4 Dictionary
      # Evince            // Document viewer
      # Orage             // Calendar
      # system-config-printer
      # Network manager
      # Xfce power manager
      # Pulse Audio Volume Control
      # VLC
      # Ristretto Image Viewer
      # Simple Scan
      # xfce4 settings display
      # Moving splash screen

      # Teamviewer is free to use for personal use
      # https://www.teamviewer.com/en/credentials/free-for-personal-use/
      - { pkg: teamviewer,                    desc: All-In-One Software for Remote Support and Online Meetings, type: CYBERLINUX }
    configs:
      #- { apply: chromebook-config }
      - { apply: teamviewer-client-config }

  # Server
  # ----------------------------------------------------------------------------
  - name: server
    type: machine
    base: lite
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-server                   // Lite + LAMP type services"
    packages:
      - { install: server-pkgs }

      # MakeMKV is free while in beta but is a commercial product required a license normally
      # https://www.makemkv.com/forum2/viewtopic.php?f=5&t=1053
      - { pkg: makemkv,                       desc: DVD and Blu-ray to MKV converter, type: CYBERLINUX }

      # Teamviewer is free to use for personal use
      # https://www.teamviewer.com/en/credentials/free-for-personal-use/
      - { pkg: teamviewer,                    desc: All-In-One Software for Remote Support and Online Meetings, type: CYBERLINUX }
    configs:
      - { apply: server-config }
      - { apply: makemkv-config }
      - { apply: teamviewer-host-config }

  # Heavy
  # ----------------------------------------------------------------------------
  - name: heavy
    type: machine
    base: lite
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-heavy                    // Lite + conky, guake and other apps"
    packages:
      - { install: heavy-pkgs }

      # MakeMKV is free while in beta but is a commercial product required a license normally
      # https://www.makemkv.com/forum2/viewtopic.php?f=5&t=1053
      - { pkg: makemkv,                       desc: DVD and Blu-ray to MKV converter, type: CYBERLINUX }

      # Teamviewer is free to use for personal use
      # https://www.teamviewer.com/en/credentials/free-for-personal-use/
      - { pkg: teamviewer,                    desc: All-In-One Software for Remote Support and Online Meetings, type: CYBERLINUX }
    configs:
      - { apply: heavy-config }
      - { apply: makemkv-config }
      - { apply: teamviewer-host-config }

  # Theater
  # ----------------------------------------------------------------------------
  - name: theater
    type: machine
    base: heavy
    vars: { fontsize: 18 }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-theater                  // Heavy + Kodi and media apps"
        params: autologin=1
    packages:
      - { install: theater-pkgs }
    configs:
      - { apply: theater-config }

  # Desktop
  # ----------------------------------------------------------------------------
  - name: desktop
    type: machine
    base: heavy
    groups: [docker]
    vars:
      wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-desktop                  // Heavy + development and office apps"
    packages:
      - { install: desktop-pkgs }

      # The Extension Pack binaries are released under the VirtualBox Personal Use and Evaluation License (PUEL).
      # https://www.virtualbox.org/wiki/Downloads
      - { pkg: virtualbox-ext-oracle,         desc: Oracle VM VirtualBox Extension Pack, type: CYBERLINUX }
    configs:
      - { apply: desktop-config }

  # Live
  # ----------------------------------------------------------------------------
  - name: live
    type: machine
    base: heavy
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Start <%=distro%>-recovery                  // Live environment based on heavy"
