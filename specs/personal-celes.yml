# Samsung Chromebook 3 (a.k.a celes)
# Personal - uses applications with various restrictions and can not be used
# commercial purposes. It is only to be used for personal use only.
# ------------------------------------------------------------------------------
layers:

  # Base
  # ----------------------------------------------------------------------------
  - name: base
    type: machine
    multilib: true
    groups: [lp, wheel, network, storage, users]
    vars: { fontsize: 10 }
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    deployment:
      entry: "Deploy <%=distro%>-base                    // Minimal shell"
      kernel: linux-celes
    packages:
      - { install: machine-pkgs }
      - { install: machine-tools }
      - { install: shell-pkgs }

    configs:
      - { apply: machine-config }
      - { apply: shell-config }

  # Lite
  # ----------------------------------------------------------------------------
  - name: lite
    type: machine
    base: base
    groups: [video, audio]
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    deployment:
      entry: "Deploy <%=distro%>-lite                    // Shell + min X11"
      kernel: linux-celes
    packages:
      - { install: lite-pkgs }

      # Adobe fonts from adobe reader
      # https://aur.archlinux.org/cgit/aur.git/tree/LICENSE?h=ttf-adobe-fonts
      - { pkg: ttf-adobe-fonts,               desc: Adobe fonts including Myriad Minion and Courier, type: CYBERLINUX }
    configs:
      - { apply: lite-config }

  # Desktop
  # ----------------------------------------------------------------------------
  - name: desktop
    type: machine
    base: lite
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Deploy <%=distro%>-desktop                 // Lite + more apps"
      kernel: linux-celes
    packages:
      #- { install: heavy-pkgs }
      - { install: laptop-pkgs }
        #- { install: desktop-pkgs }

      # Possible apps to add
      # ristretto         // Image viewer
      # Hexchat           // IRC
      # Pidgin            // Messaging
      # Xfce4 Dictionary
      # Network manager
      # Xfce power manager
      # xfce4 settings display

      # Teamviewer is free to use for personal use
      # https://www.teamviewer.com/en/credentials/free-for-personal-use/
      - { pkg: teamviewer,                    desc: All-In-One Software for Remote Support and Online Meetings, type: CYBERLINUX }
    configs:
      #- { apply: heavy-config }
      #- { apply: celes-config }
      #- { apply: desktop-config }
      - { apply: teamviewer-client-config }

  # Live
  # ----------------------------------------------------------------------------
  - name: live
    type: machine
    base: desktop
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Start <%=distro%>-recovery                 // Live environment"
      kernel: linux-celes
