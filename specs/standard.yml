layers:

  # Base
  # ----------------------------------------------------------------------------
  - name: base
    type: machine
    multilib: true
    groups: [lp, wheel, network, storage, users]
    vars: { fontsize: 10 }
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    deployment:
      entry: "Deploy <%=distro%>-base                    // Minimal shell"
      kernel: linux
    packages:
      - { install: machine-pkgs }
      - { install: machine-tools }
      - { install: virtualbox-guest-nox }
      - { install: shell-pkgs }

    configs:
      - { apply: machine-config }
      - { apply: shell-config }

  # Lite
  # ----------------------------------------------------------------------------
  - name: lite
    type: machine
    base: shell
    groups: [ video, audio]
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Deploy <%=distro%>-lite                    // Shell + min X11"
      kernel: linux
    packages:
      - { install: lite-pkgs }
    configs:
      - { apply: lite-config }

  # Heavy
  # ----------------------------------------------------------------------------
  - name: heavy
    type: machine
    base: lite
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Deploy <%=distro%>-heavy                   // Lite + more bling"
      kernel: linux
    packages:
      - { install: heavy-pkgs }
    configs:
      - { apply: heavy-config }

  # K8snode
  # ----------------------------------------------------------------------------
  - name: k8snode
    type: machine
    base: shell
    groups: [docker]
    vagrant: { vram: 8, cpus: 2, ram: 2048 }
    deployment:
      entry: "Deploy <%=distro%>-k8snode                 // Shell + k8s node"
      kernel: linux
    packages:
      - { install: k8snode-pkgs }
    configs:
      - { apply: k8snode-config }

  # Theater
  # ----------------------------------------------------------------------------
  - name: theater
    type: machine
    base: heavy
    vars: { fontsize: 18, wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Deploy <%=distro%>-theater                 // Heavy + media apps"
      kernel: linux
      params: autologin=1
    packages:
      - { install: theater-pkgs }
    configs:
      - { apply: theater-config }

  # Desktop
  # ----------------------------------------------------------------------------
  - name: desktop
    type: machine
    base: heavy
    groups: [docker]
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Deploy <%=distro%>-desktop                 // Heavy + more apps"
      kernel: linux
    packages:
      - { install: desktop-pkgs }
    configs:
      - { apply: desktop-config }

  # Live
  # ----------------------------------------------------------------------------
  - name: live
    type: machine
    base: heavy
    vars: { wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    deployment:
      entry: "Start <%=distro%>-recovery                 // Live environment"
      kernel: linux
