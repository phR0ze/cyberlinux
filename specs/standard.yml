layers:

  # Base
  # ----------------------------------------------------------------------------
  - name: base
    type: machine
    multilib: true
    vars: { fontsize: 10 }
    groups: [lp, wheel, network, storage, users]
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    boot:
      - entry: "Deploy <%=distro%>-base                     // Minimal shell environment"
    packages:
      - { install: machine-pkgs }
      - { install: machine-tools }
      - { install: virtualbox-guest-nox }

    configs:
      - { apply: machine-config }

  # Shell
  # ----------------------------------------------------------------------------
  - name: shell
    type: machine
    base: base
    vagrant: { vram: 32, cpus: 2, ram: 2048 }
    boot:
      - entry: "Deploy <%=distro%>-shell                    // Base + full shell development env"
    packages:
      - { install: shell-pkgs }
    configs:
      - { apply: shell-config }

  # Lite
  # ----------------------------------------------------------------------------
  - name: lite
    type: machine
    base: shell
    vars:
      wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg
    groups:
      - video
      - audio
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-lite                     // Shell + minimal X11 environment"
    packages:
      - { install: lite-pkgs }
    configs:
      - { apply: lite-config }

  # Server
  # ----------------------------------------------------------------------------
  - name: server
    type: machine
    base: lite
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-server                   // Lite + LAMP type services"
    packages:
      - { install: server-pkgs }
    configs:
      - { apply: server-config }

  # Heavy
  # ----------------------------------------------------------------------------
  - name: heavy
    type: machine
    base: lite
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-heavy                    // Lite + conky, guake and other apps"
    packages:
      - { install: heavy-pkgs }
    configs:
      - { apply: heavy-config }

  # K8snode
  # ----------------------------------------------------------------------------
  - name: k8snode
    type: machine
    base: shell
    groups: [docker]
    vagrant: { vram: 8, cpus: 2, ram: 2048 }
    boot:
      - entry: "Deploy <%=distro%>-k8snode                  // Shell + k8s node environment"
    packages:
      - { install: k8snode-pkgs }
    configs:
      - { apply: k8snode-config }

  # Theater
  # ----------------------------------------------------------------------------
  - name: theater
    type: machine
    base: heavy
    vars: { fontsize: 18 }
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-theater                  // Heavy + Kodi and media apps"
    packages:
      - { install: theater-pkgs }
    configs:
      - { apply: theater-config }

  # Desktop
  # ----------------------------------------------------------------------------
  - name: desktop
    type: machine
    base: heavy
    groups: [docker]
    vars:
      wallpaper: /usr/share/wallpaper/dreamfusion003_1280x1024.jpg
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Deploy <%=distro%>-desktop                  // Heavy + development and office apps"
    packages:
      - { install: desktop-pkgs }
    configs:
      - { apply: desktop-config }


  # Live
  # ----------------------------------------------------------------------------
  - name: live
    type: machine
    base: heavy
    vagrant: { vram: 32, cpus: 2, ram: 2048, v3d: 'on' }
    boot:
      - entry: "Start <%=distro%>-recovery                  // Live environment based on heavy"
